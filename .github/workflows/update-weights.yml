name: Update Weights
on:
  schedule:
    # 美股收盤後約 UTC 21:30 (冬令時為 22:30)
    - cron: '30 21 * * *'
    # 港股收盤後約 UTC 08:30
    - cron: '30 8 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Update weights
        run: python update_weights.py
      - name: Commit updated files
        run: |
          git config --global user.name 'gh-actions'
          git config --global user.email 'actions@github.com'
          git add history_*.json weights.json
          git commit -m "Auto-update weights and history [skip ci]" || echo "No changes"
          git push
