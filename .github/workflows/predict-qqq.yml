name: Predict QQQ
on:
  schedule:
    - cron: '0 13 * * *'   # UTC 13:00 = 香港 21:00
  workflow_dispatch:
jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4          # 更新到 v4
      - uses: actions/setup-python@v5      # 更新到 v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run QQQ prediction
        run: python predict.py QQQ
        env:
          WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
          WHATSAPP_API_KEY: ${{ secrets.WHATSAPP_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
